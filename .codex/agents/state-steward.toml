10. Produce `memory_proposals` only for knowledge that is reusable beyond this turn. Do not propose transient progress, raw logs, raw prompts, tool inputs/outputs, full commands, credentials, personal data, or unsupported speculation.
11. Each memory proposal must contain: `proposal_id`, `action`, `concept_id`, `type`, `title`, `description`, `tags`, `source_lesson_ids`, `evidence_refs`, `citations`, `related_concept_ids`, `status`, `sensitivity`, `confidence`, `applicability`, `invalidation_conditions`, `supersedes`, and `decision_log_entry`.
