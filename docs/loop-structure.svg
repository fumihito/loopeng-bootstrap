<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1840 1620" width="1840" height="1620" role="img" aria-labelledby="title desc">
  <title id="title">Loop structure</title>
  <desc id="desc">A main-loop diagram showing entry routing, gatekeeping, sensemaking, execution, state stewardship, memory publication, watchdog monitoring, learning observation, and the handoff to the next loop execution.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4c6ef5"/>
      <stop offset="100%" stop-color="#12b886"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#556b86"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f7b5a"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#16324f" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 700 32px/1.2 Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #102a43; }
      .subtitle { font: 500 16px/1.4 Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #52606d; }
      .label { font: 700 17px/1.3 Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #102a43; }
      .small { font: 500 14px/1.35 Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #334e68; }
      .tiny { font: 500 13px/1.3 Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #52606d; }
      .node { fill: #ffffff; stroke-width: 2.2; rx: 18; ry: 18; filter: url(#shadow); }
      .decision { fill: #fff8eb; stroke: #f08c00; }
      .entry { fill: #eef4ff; stroke: #4c6ef5; }
      .exec { fill: #f3f0ff; stroke: #7950f2; }
      .control { fill: #e6fcf5; stroke: #12b886; }
      .memory { fill: #e6fcf5; stroke: #12b886; }
      .audit { fill: #f8f0fc; stroke: #ae3ec9; }
      .human { fill: #fff0f6; stroke: #d6336c; }
      .stop { fill: #f1f3f5; stroke: #868e96; }
      .connector { stroke: #556b86; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .connector-accent { stroke: #0f7b5a; stroke-width: 2.8; fill: none; marker-end: url(#arrow-accent); }
      .connector-dashed { stroke: #d6336c; stroke-width: 2.8; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .guide { stroke: #d9e2ec; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <rect x="0" y="0" width="1840" height="1620" fill="url(#bg)"/>
  <rect x="32" y="32" width="1776" height="1556" rx="30" ry="30" fill="#ffffff" opacity="0.55"/>

  <text x="80" y="92" class="title">Loop structure</text>
  <text x="80" y="125" class="subtitle">Main loop source: entry routing, gatekeeping, sensemaking, execution, memory publication, watchdog monitoring, and the next execution trigger.</text>

  <!-- Entry layer -->
  <rect x="80" y="170" width="220" height="92" class="node entry"/>
  <text x="190" y="206" text-anchor="middle" class="label">Human input</text>
  <text x="190" y="232" text-anchor="middle" class="small">entry point</text>

  <path d="M 300 216 L 352 216" class="connector"/>
  <rect x="352" y="170" width="240" height="92" class="node decision"/>
  <text x="472" y="204" text-anchor="middle" class="label">Entry router</text>
  <text x="472" y="231" text-anchor="middle" class="small">route by prompt prefix</text>

  <path d="M 592 192 C 650 160, 650 160, 706 160" class="connector"/>
  <rect x="706" y="114" width="260" height="92" class="node exec"/>
  <text x="836" y="148" text-anchor="middle" class="label">Direct mode</text>
  <text x="836" y="175" text-anchor="middle" class="small">single controlled inquiry</text>

  <path d="M 592 216 L 706 216" class="connector"/>
  <rect x="706" y="170" width="260" height="92" class="node exec"/>
  <text x="836" y="204" text-anchor="middle" class="label">SOP router</text>
  <text x="836" y="231" text-anchor="middle" class="small">load sop-header skill</text>

  <path d="M 472 262 C 472 312, 472 312, 472 340" class="connector"/>

  <!-- Gatekeeper branch -->
  <rect x="352" y="340" width="240" height="92" class="node control"/>
  <text x="472" y="374" text-anchor="middle" class="label">Gatekeeper</text>
  <text x="472" y="401" text-anchor="middle" class="small">validate operating contract</text>

  <path d="M 592 386 L 652 386" class="connector"/>
  <polygon points="652,340 718,386 652,432 586,386" class="node decision"/>
  <text x="652" y="377" text-anchor="middle" class="label">Gatekeeper</text>
  <text x="652" y="400" text-anchor="middle" class="label">verdict</text>

  <path d="M 718 386 L 812 386" class="connector"/>
  <rect x="812" y="294" width="264" height="92" class="node human"/>
  <text x="944" y="328" text-anchor="middle" class="label">Loop Brief Assistant</text>
  <text x="944" y="355" text-anchor="middle" class="small">identify missing conditions</text>

  <path d="M 944 386 L 944 450" class="connector"/>
  <rect x="812" y="450" width="264" height="92" class="node human"/>
  <text x="944" y="484" text-anchor="middle" class="label">Human supplies missing</text>
  <text x="944" y="511" text-anchor="middle" class="small">conditions</text>

  <path d="M 944 542 L 944 604" class="connector"/>
  <rect x="812" y="604" width="264" height="92" class="node human"/>
  <text x="944" y="638" text-anchor="middle" class="label">Gatekeeper re-evaluation</text>
  <text x="944" y="665" text-anchor="middle" class="small">return READY / NEEDS_INPUT / REJECT</text>

  <path d="M 1076 340 C 1150 340, 1150 340, 1180 340" class="connector"/>
  <rect x="1180" y="294" width="220" height="92" class="node stop"/>
  <text x="1290" y="328" text-anchor="middle" class="label">Reject / stop</text>
  <text x="1290" y="355" text-anchor="middle" class="small">do not start loop</text>

  <path d="M 944 696 C 944 760, 660 760, 472 732" class="connector"/>
  <rect x="812" y="722" width="264" height="92" class="node entry"/>
  <text x="944" y="756" text-anchor="middle" class="label">Trusted Loop Brief</text>
  <text x="944" y="783" text-anchor="middle" class="small">normalized task frame</text>

  <!-- Sensemaking and execution -->
  <path d="M 472 432 L 472 458" class="connector"/>
  <rect x="352" y="458" width="240" height="92" class="node entry"/>
  <text x="472" y="492" text-anchor="middle" class="label">Sensemaker</text>
  <text x="472" y="519" text-anchor="middle" class="small">frame problem and retrieve memory</text>

  <path d="M 592 504 L 650 504" class="connector"/>
  <rect x="650" y="458" width="294" height="92" class="node exec"/>
  <text x="797" y="492" text-anchor="middle" class="label">Normalized task frame</text>
  <text x="797" y="519" text-anchor="middle" class="small">criteria, risks, non-goals</text>

  <path d="M 944 504 L 1000 504" class="connector"/>
  <rect x="1000" y="458" width="234" height="92" class="node control"/>
  <text x="1117" y="492" text-anchor="middle" class="label">Governor</text>
  <text x="1117" y="519" text-anchor="middle" class="small">policy and authority enforcement</text>

  <path d="M 1170 504 L 1230 504" class="connector"/>
  <rect x="1230" y="458" width="250" height="92" class="node exec"/>
  <text x="1355" y="492" text-anchor="middle" class="label">Generator / Actor</text>
  <text x="1355" y="519" text-anchor="middle" class="small">produce changes or result</text>

  <path d="M 1355 550 L 1355 588" class="connector"/>
  <rect x="1120" y="588" width="250" height="92" class="node exec"/>
  <text x="1245" y="622" text-anchor="middle" class="label">Integrator</text>
  <text x="1245" y="649" text-anchor="middle" class="small">compose parallel outputs</text>

  <path d="M 1370 634 L 1420 634" class="connector"/>
  <rect x="1422" y="588" width="250" height="92" class="node exec"/>
  <text x="1547" y="622" text-anchor="middle" class="label">Evaluator</text>
  <text x="1547" y="649" text-anchor="middle" class="small">verify explicit criteria</text>

  <path d="M 1547 680 L 1547 742" class="connector"/>
  <polygon points="1547,742 1620,788 1547,834 1474,788" class="node decision"/>
  <text x="1547" y="780" text-anchor="middle" class="label">Evaluation result</text>

  <!-- State / meta / memory -->
  <path d="M 1474 788 C 1410 788, 1360 816, 1320 840" class="connector"/>
  <rect x="1120" y="840" width="250" height="92" class="node control"/>
  <text x="1245" y="874" text-anchor="middle" class="label">State Steward</text>
  <text x="1245" y="901" text-anchor="middle" class="small">record transition and proposals</text>

  <path d="M 1370 886 L 1424 886" class="connector"/>
  <rect x="1424" y="840" width="250" height="92" class="node audit"/>
  <text x="1549" y="874" text-anchor="middle" class="label">Meta-Evaluator</text>
  <text x="1549" y="901" text-anchor="middle" class="small">challenge frame and evidence</text>

  <path d="M 1549 932 L 1549 996" class="connector"/>
  <polygon points="1549,996 1622,1042 1549,1088 1476,1042" class="node decision"/>
  <text x="1549" y="1030" text-anchor="middle" class="label">Meta verdict</text>

  <path d="M 1476 1042 C 1408 1042, 1370 1020, 1320 1002" class="connector"/>
  <polygon points="1245,996 1320,1042 1245,1088 1170,1042" class="node decision"/>
  <text x="1245" y="1030" text-anchor="middle" class="label">Accepted durable</text>
  <text x="1245" y="1053" text-anchor="middle" class="label">knowledge exists?</text>

  <path d="M 1170 1042 L 1112 1042" class="connector"/>
  <rect x="860" y="996" width="250" height="92" class="node memory"/>
  <text x="985" y="1030" text-anchor="middle" class="label">Memory Curator</text>
  <text x="985" y="1057" text-anchor="middle" class="small">produce OKF documents</text>

  <path d="M 860 1042 L 808 1042" class="connector"/>
  <rect x="608" y="996" width="220" height="92" class="node memory"/>
  <text x="718" y="1030" text-anchor="middle" class="label">okfctl transaction</text>
  <text x="718" y="1057" text-anchor="middle" class="small">validate, index, commit</text>

  <path d="M 608 1042 L 552 1042" class="connector"/>
  <rect x="320" y="996" width="240" height="92" class="node memory"/>
  <text x="440" y="1030" text-anchor="middle" class="label">LLMWiki</text>
  <text x="440" y="1057" text-anchor="middle" class="small">OKF knowledge bundle</text>

  <!-- Completion / revision / escalation -->
  <path d="M 1245 1088 L 1245 1162" class="connector"/>
  <rect x="1080" y="1162" width="220" height="92" class="node exec"/>
  <text x="1190" y="1196" text-anchor="middle" class="label">Turn completed</text>
  <text x="1190" y="1223" text-anchor="middle" class="small">successful loop turn</text>

  <path d="M 1245 1088 C 1320 1088, 1360 1128, 1440 1162" class="connector"/>
  <rect x="1320" y="1162" width="240" height="92" class="node human"/>
  <text x="1440" y="1196" text-anchor="middle" class="label">Revision required</text>
  <text x="1440" y="1223" text-anchor="middle" class="small">start next iteration</text>

  <path d="M 1560 1088 C 1600 1128, 1600 1128, 1600 1162" class="connector-dashed"/>
  <rect x="1560" y="1162" width="180" height="92" class="node human"/>
  <text x="1650" y="1196" text-anchor="middle" class="label">Escalate</text>
  <text x="1650" y="1223" text-anchor="middle" class="small">human review</text>

  <path d="M 1190 1254 C 1190 1318, 900 1318, 760 1290" class="connector"/>
  <path d="M 1440 1254 C 1440 1324, 980 1340, 760 1290" class="connector"/>
  <path d="M 1650 1254 C 1650 1330, 1040 1360, 760 1290" class="connector"/>

  <!-- Watchdog -->
  <path d="M 1245 742 C 1245 800, 980 800, 940 820" class="connector"/>
  <rect x="352" y="840" width="240" height="92" class="node stop"/>
  <text x="472" y="874" text-anchor="middle" class="label">Watchdog</text>
  <text x="472" y="901" text-anchor="middle" class="small">deterministic monitoring</text>

  <path d="M 592 886 L 652 886" class="connector"/>
  <rect x="652" y="840" width="250" height="92" class="node stop"/>
  <text x="777" y="874" text-anchor="middle" class="label">Watchdog / Recovery</text>
  <text x="777" y="901" text-anchor="middle" class="small">continue, rollback or escalate</text>

  <path d="M 900 886 C 980 886, 1040 886, 1120 886" class="guide"/>
  <path d="M 902 886 L 1120 886" class="guide"/>

  <!-- Learning / next execution -->
  <path d="M 1190 1254 L 1190 1338" class="connector-accent"/>
  <rect x="352" y="1338" width="260" height="92" class="node audit"/>
  <text x="482" y="1372" text-anchor="middle" class="label">Learning Observer</text>
  <text x="482" y="1399" text-anchor="middle" class="small">cross-turn deterministic metrics</text>

  <path d="M 612 1384 L 670 1384" class="connector"/>
  <rect x="670" y="1338" width="240" height="92" class="node audit"/>
  <text x="790" y="1372" text-anchor="middle" class="label">Learning Auditor</text>
  <text x="790" y="1399" text-anchor="middle" class="small">interpret long-term health</text>

  <path d="M 482 1430 L 482 1490" class="connector"/>
  <rect x="352" y="1490" width="260" height="92" class="node entry"/>
  <text x="482" y="1524" text-anchor="middle" class="label">Scheduler / trigger</text>
  <text x="482" y="1551" text-anchor="middle" class="small">external or periodic start</text>

  <rect x="910" y="1490" width="280" height="92" class="node entry"/>
  <text x="1050" y="1524" text-anchor="middle" class="label">Next loop execution</text>
  <text x="1050" y="1551" text-anchor="middle" class="small">state, memory, policy</text>

  <path d="M 612 1536 C 720 1536, 820 1536, 910 1536" class="connector"/>
  <path d="M 1050 1490 C 1050 1440, 930 1400, 790 1384" class="connector-dashed"/>
  <path d="M 790 1430 C 790 1380, 600 1310, 482 1450" class="connector-dashed"/>
  <path d="M 1050 1490 C 1050 1440, 1480 1420, 1540 1254" class="connector-dashed"/>

  <!-- Cross-loop feedback -->
  <path d="M 440 1088 C 330 1180, 300 1280, 352 1490" class="connector-dashed"/>
  <path d="M 985 1088 C 860 1180, 760 1280, 790 1338" class="connector-dashed"/>
  <path d="M 790 1430 C 790 1460, 770 1470, 612 1490" class="connector-dashed"/>

  <text x="80" y="1588" class="tiny">Dashed connectors mark cross-turn persistence, knowledge reuse, and policy feedback into the next execution.</text>
  <rect x="80" y="18" width="1680" height="2" fill="url(#accent)" opacity="0.9"/>
</svg>
